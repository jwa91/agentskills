version: 2

project_name: agentskills

# Tag scheme: plain `vX.Y.Z` for binary releases; per-skill tags
# (`<skill>/vX.Y.Z`) must never trigger a binary release.
#
# OSS goreleaser does not include the `monorepo` block (Pro-only), so we
# use `git.ignore_tags` to filter the per-skill `<skill>/vX.Y.Z` tags out
# of version detection. Binary releases are driven by plain `v*` tags on
# the repo root, matching the prehandover pattern.
git:
  ignore_tags:
    - "*/v*"

before:
  hooks:
    - go mod tidy

builds:
  - id: agentskills
    main: ./tools/agentskills
    binary: agentskills
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    hooks:
      # Codesign darwin binaries with Developer ID + hardened runtime.
      # No-op on linux and when MACOS_SIGN_IDENTITY is unset (CI).
      post:
        - cmd: 'scripts/codesign.sh "{{ .Target }}" "{{ .Path }}"'

archives:
  - id: default
    ids:
      - agentskills
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge "
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^.*feat(\\(.+\\))??!?:.+$"
      order: 0
    - title: Fixes
      regexp: "^.*fix(\\(.+\\))??!?:.+$"
      order: 1
    - title: Refactors
      regexp: "^.*refactor(\\(.+\\))??!?:.+$"
      order: 2
    - title: Other
      order: 999

# Modern Homebrew distribution for pre-compiled binaries (ADR 0008 in
# jwa91/homebrew-tap). Publishes Casks/agentskills.rb back to the tap.
# `brew install jwa91/tap/agentskills` is unchanged — modern brew
# auto-detects the cask kind.
homebrew_casks:
  - name: agentskills
    ids:
      - default
    repository:
      owner: jwa91
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/jwa91/agentskills
    description: Install and manage agent skills inside a project
    license: MIT
    binaries: [agentskills]
    dependencies:
      - formula: git
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "feat(agentskills): cask update to {{ .Tag }}"

release:
  github:
    owner: jwa91
    name: agentskills
  draft: false
  prerelease: auto
